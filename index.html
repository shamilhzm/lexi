<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1" />
    <meta name="theme-color" content="#080b11" />
    <!-- Apply the saved light/dark preference before first paint (avoids a flash). -->
    <script>
      (function () {
        var t;
        try {
          var v = localStorage.getItem('lexi.theme.v1');
          t = (v === 'light' || v === 'dark') ? v
            : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        } catch (e) { t = 'dark'; }
        document.documentElement.classList.add(t);
        if (t === 'light') {
          var m = document.querySelector('meta[name="theme-color"]');
          if (m) m.setAttribute('content', '#eef3f8');
        }
      })();
    </script>
    <meta name="description" content="Lexi — a German vocabulary terminal (A1–C2). Spaced repetition over a live knowledge heatmap." />
    <!-- PWA -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon-180.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Lexi" />
    <!-- Display serif for headwords (Karteto "paper" look); falls back to Georgia offline -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet" />
    <title>Lexi — German Vocab Terminal</title>
    <style>
      /* Boot splash — shown instantly while the JS bundle + lexicon load.
         React replaces #root's contents on first render. */
      #boot {
        position: fixed; inset: 0; display: grid; place-items: center;
        background: radial-gradient(120% 90% at 50% 0%, #0f2230 0%, #080b11 60%);
        color: #e6edf3; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      #boot .mark {
        width: 56px; height: 56px; display: grid; place-items: center;
        filter: drop-shadow(0 12px 40px rgba(56, 205, 232, .22));
        animation: bootpulse 1.6s ease-in-out infinite;
      }
      #boot .mark svg { width: 56px; height: 56px; display: block; }
      #boot .wm { margin-top: 18px; font-weight: 700; letter-spacing: .5px; font-size: 18px; }
      #boot .tag { margin-top: 4px; color: #8b97a7; font-size: 11px; letter-spacing: 3px; }
      #boot .bar { margin-top: 18px; width: 132px; height: 3px; border-radius: 3px; background: #1f2733; overflow: hidden; }
      #boot .bar i { display: block; height: 100%; width: 40%; border-radius: 3px; background: #38cde8;
        animation: bootbar 1.1s ease-in-out infinite; }
      #boot .wm i { font-style: normal; color: #38cde8; margin-left: 2px; animation: bootcursor 1.1s step-end infinite; }
      @keyframes bootpulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.06); } }
      @keyframes bootbar { 0% { transform: translateX(-120%);} 100% { transform: translateX(330%);} }
      @keyframes bootcursor { 50% { opacity: 0; } }
      @media (prefers-reduced-motion: reduce) { #boot .mark, #boot .bar i, #boot .wm i { animation: none; } }
      /* Light-theme boot splash (the cyan mark works on both). */
      html.light #boot { background: radial-gradient(120% 90% at 50% 0%, #ffffff 0%, #eef3f8 60%); color: #16202e; }
      html.light #boot .tag { color: #55657a; }
      html.light #boot .bar { background: #d2dce7; }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="boot">
        <div style="text-align:center">
          <div class="mark">
            <svg viewBox="0 0 150 150" xmlns="http://www.w3.org/2000/svg">
              <rect width="150" height="150" rx="34" fill="#0e1722"/>
              <rect x="52" y="40" width="20" height="72" rx="3" fill="#38cde8"/>
              <rect x="52" y="92" width="60" height="20" rx="3" fill="#38cde8"/>
              <rect x="88" y="40" width="20" height="22" rx="3" fill="#38cde8"/>
            </svg>
          </div>
          <div class="wm">Lexi<i>▍</i></div>
          <div class="tag">GERMAN VOCAB TERMINAL</div>
          <div class="bar"><i></i></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
