<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1" />
    <meta name="theme-color" content="#0a0d12" />
    <meta name="description" content="Lexi — a free, open-source German vocabulary terminal (A1–C2). Spaced repetition over a live dictionary market." />
    <!-- PWA -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon-180.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Lexi" />
    <title>Lexi — German Vocab Terminal</title>
    <style>
      /* Boot splash — shown instantly while the JS bundle + lexicon load.
         React replaces #root's contents on first render. */
      #boot {
        position: fixed; inset: 0; display: grid; place-items: center;
        background: radial-gradient(120% 90% at 50% 0%, #11161e 0%, #0a0d12 60%);
        color: #e6edf3; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      #boot .mark {
        width: 56px; height: 56px; border-radius: 14px; display: grid; place-items: center;
        font-family: Georgia, "Times New Roman", serif; font-weight: 700; font-size: 34px; color: #0a0d12;
        background: linear-gradient(135deg, #ffb000, #ff7b00);
        box-shadow: 0 12px 40px rgba(255, 176, 0, .25);
        animation: bootpulse 1.6s ease-in-out infinite;
      }
      #boot .wm { margin-top: 18px; font-weight: 700; letter-spacing: .5px; font-size: 18px; }
      #boot .tag { margin-top: 4px; color: #8b97a7; font-size: 11px; letter-spacing: 3px; }
      #boot .bar { margin-top: 18px; width: 132px; height: 3px; border-radius: 3px; background: #1f2733; overflow: hidden; }
      #boot .bar i { display: block; height: 100%; width: 40%; border-radius: 3px; background: #ffb000;
        animation: bootbar 1.1s ease-in-out infinite; }
      @keyframes bootpulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.06); } }
      @keyframes bootbar { 0% { transform: translateX(-120%);} 100% { transform: translateX(330%);} }
      @media (prefers-reduced-motion: reduce) { #boot .mark, #boot .bar i { animation: none; } }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="boot">
        <div style="text-align:center">
          <div class="mark">L</div>
          <div class="wm">Lexi</div>
          <div class="tag">GERMAN VOCAB TERMINAL</div>
          <div class="bar"><i></i></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
